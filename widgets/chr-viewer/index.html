<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHR Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../css/app.css" rel="stylesheet">
</head>
<body class="bg-dark text-light py-4">

    <div class="container-fluid px-4">
        <div class="row g-4">
            <div class="col-12 col-lg-6 text-center text-lg-middle">
                <div class="p-3 border border-secondary rounded bg-black bg-opacity-10 text-start palette-sync-box" id="palette-info">
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-2">
                        <span class="text-secondary small fw-bold">Active Hardware Palettes</span>
                        <button id="btnApplyPalette" class="btn btn-sm btn-primary" onclick="applyCurrentPalette()">Apply Palette Colors</button>
                    </div>
                    <div id="paletteContainer" class="d-flex flex-wrap gap-1"></div>

                    <div class="mt-3">
                        <label class="form-label small text-secondary fw-bold mb-2 d-block">Viewer Sub-Palette Selection <span class="text-muted">(click copies raw hex for hex editor)</span>:</label>
                        <div id="dynamicPaletteUIContainer"></div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-6">
                <div class="card bg-dark border-secondary h-100 shadow-sm">

                    <div class="card-body tab-content">

                        <div class="tab-pane fade show active" id="sprite-pane" role="tabpanel" aria-labelledby="sprite-tab" tabindex="0">

                            <div class="card bg-black bg-opacity-20 border-secondary mb-3">
                                <div class="card-header border-secondary d-flex justify-content-between align-items-center py-2">
                                    <span class="small text-muted font-monospace" id="chrOffsetDisplay">Offset: 0x000000</span>
                                    <div class="d-flex gap-1">
                                        <button class="btn btn-xs btn-outline-secondary py-0 px-2 text-light" onclick="adjustZoom(-1)">-</button>
                                        <span id="zoomDisplay" class="small px-1 font-monospace" style="min-width: 35px; text-align: center;">2x</span>
                                        <button class="btn btn-xs btn-outline-secondary py-0 px-2 text-light" onclick="adjustZoom(1)">+</button>
                                    </div>
                                </div>
                                <div class="card-body text-center overflow-auto p-2">
                                    <canvas id="chrViewerCanvas" class="pixelated"></canvas>
                                </div>
                                <div class="card-footer border-secondary py-1 text-center">
                                    <small class="text-muted" style="font-size: 0.75rem;">Use Mouse Wheel or Up/Down arrows inside workspace to scroll tile data.</small>
                                </div>
                            </div>
                            <div class="p-3 border border-secondary rounded bg-black bg-opacity-10">
                                <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
                                    <div class="btn-group btn-group-sm" role="group" aria-label="Viewer Work Modes">
                                        <input type="radio" class="btn-check" name="viewerMode" id="modePan" autocomplete="off" checked onchange="toggleViewerMode('pan')">
                                        <label class="btn btn-outline-secondary d-flex align-items-center gap-1" for="modePan">
                                            <i class="bi bi-hand-index-thumb"></i> Pan
                                        </label>

                                        <input type="radio" class="btn-check" name="viewerMode" id="modePen" autocomplete="off" onchange="toggleViewerMode('pen')">
                                        <label class="btn btn-outline-secondary d-flex align-items-center gap-1" for="modePen">
                                            <i class="bi bi-pencil"></i> Pen
                                        </label>

                                        <input type="radio" class="btn-check" name="viewerMode" id="modeCDL" autocomplete="off" onchange="toggleViewerMode('cdl')">
                                        <label class="btn btn-outline-danger d-flex align-items-center gap-1" for="modeCDL">
                                            <i class="bi bi-layers"></i> CDL View
                                        </label>
                                    </div>

                                    <div class="d-flex gap-1">
                                        <button type="button" id="btnRefreshState" class="btn btn-sm btn-outline-info d-none" onclick="refreshEmulatorState()">
                                            <i class="bi bi-arrow-repeat"></i> Refresh State
                                        </button>
                                        <button type="button" id="btnReloadEmulator" class="btn btn-sm btn-outline-warning" onclick="handleEmulatorReload()">
                                            <i class="bi bi-arrow-clockwise"></i> Reload
                                        </button>
                                        <button type="button" class="btn btn-sm btn-outline-success" onclick="downloadCachedRom()">
                                            <i class="bi bi-download"></i> Download
                                        </button>
                                    </div>
                                </div>

                                <!-- Flexible Tile Grid Settings for MD / SMS / custom ROM layouts -->
                                <div class="border border-secondary p-2 rounded bg-dark mt-2">
                                    <div class="d-flex flex-wrap align-items-center gap-2 small">
                                        <span class="text-secondary fw-bold me-1">Tile Grid:</span>
                                        <div class="input-group input-group-sm" style="width: auto; min-width: 110px;">
                                            <span class="input-group-text py-0 px-1">Cols</span>
                                            <input type="number" id="tilesPerRowInput" class="form-control form-control-sm" style="width: 52px;" value="16" min="1" max="128" step="1">
                                        </div>
                                        <div class="input-group input-group-sm" style="width: auto; min-width: 110px;">
                                            <span class="input-group-text py-0 px-1">Rows</span>
                                            <input type="number" id="visibleRowsInput" class="form-control form-control-sm" style="width: 52px;" value="16" min="1" max="128" step="1">
                                        </div>
                                        <button type="button" id="btnResetViewerGrid" class="btn btn-sm btn-outline-info py-0 px-2" title="Reset to system default from EmuHardwareMap">Reset</button>
                                        <small class="text-muted ms-2">Adjust to match ROM tile layout (e.g. 8 or 4 for narrow sprite strips in Sonic)</small>
                                    </div>
                                </div>

                                <div id="drawColorPickerContainer" class="border border-secondary p-2 rounded bg-dark d-none">
                                    <span class="text-secondary small fw-bold d-block mb-1">Active Pixel Value Color:</span>
                                    <div class="btn-group w-100" role="group" id="drawColorGroup">
                                        </div>
                                </div>
                            </div>

                        </div>


                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="palette.js"></script>
    <script src="spriteViewer.js"></script>

</body>
</html>
