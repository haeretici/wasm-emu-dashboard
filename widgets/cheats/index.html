<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheats Configuration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../css/app.css" rel="stylesheet">
</head>
<body class="bg-dark text-light py-4">

    <div class="container-fluid px-4" style="max-width: 800px;">
        <div class="row g-4">
            <div class="col-12">
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-2">
                    <div>
                        <h4 class="mb-1 text-info" id="systemTitle">Cheats Manager</h4>
                        <p class="text-muted small mb-0">
                            Add and manage cheats for the current game. Cheats are saved automatically.
                        </p>
                    </div>
                    <div class="d-flex flex-wrap gap-2 align-items-center">
                        <button id="btnAddCheat" class="btn btn-sm btn-outline-success">+ Add Cheat</button>
                    </div>
                </div>
                <div id="statusMessage" class="alert alert-secondary py-2 small mb-3">Loading…</div>
            </div>

            <div class="col-12">
                <div class="card bg-dark border-secondary shadow-sm">
                    <div class="card-header border-secondary py-2">
                        <span class="small text-muted fw-bold">Active Cheats for <span id="gameNameDisplay">Current Game</span></span>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-dark table-hover mb-0" id="cheatsTable">
                            <thead>
                                <tr>
                                    <th style="width: 50px;">#</th>
                                    <th>Description</th>
                                    <th>Code / Address:Value</th>
                                    <th style="width: 100px;">Status</th>
                                    <th style="width: 80px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="cheatsList">
                                <tr><td colspan="5" class="text-center text-muted py-4">Loading cheats...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for adding/editing cheat -->
    <div class="modal fade" id="cheatModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="cheatModalTitle">Add Cheat</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <input type="text" id="cheatDescription" class="form-control bg-dark text-light border-secondary" placeholder="Infinite Lives">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Code (Game Genie or Hex)</label>
                        <input type="text" id="cheatCode" class="form-control bg-dark text-light border-secondary" placeholder="E.g., AATOZA or 00A4:FF">
                        <div class="form-text text-muted">Use Game Genie code or RAM address patching (ADDR:VAL).</div>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="cheatEnabled" checked>
                        <label class="form-check-label" for="cheatEnabled">Enabled</label>
                    </div>
                    <input type="hidden" id="cheatIndex">
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btnSaveCheat">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>const STORE_NAME = 'cheats_config';</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/cheats-engine.js"></script>
    <script src="cheats.js"></script>
</body>
</html>
